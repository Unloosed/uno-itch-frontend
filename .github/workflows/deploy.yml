name: Deploy to itch.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build uno-itch-frontend
        run: |
          npm install
          npm run build

      - name: Install and publish with butler
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          wget https://broth.itch.ovh/butler/linux-amd64/butler.zip
          unzip butler.zip
          ./butler push dist/ Unloosed/test-project:html --userversion 0.0.1
