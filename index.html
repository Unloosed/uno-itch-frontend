<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Card Game Test</title>
  <style>
    body {
      margin: 0;
      background: #1e1e2e;
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    button {
      font-size: 24px;
      padding: 16px 32px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <button onclick="drawCard()">Draw Card</button>

  <script>
    function drawCard() {
      alert("You drew: Ace of Spades 🂡");
    }
  </script>
</body>

</html>
